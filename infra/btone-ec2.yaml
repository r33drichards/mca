AWSTemplateFormatVersion: "2010-09-09"
Description: >
  btone-mod-c headless deployment on Ubuntu 24.04. Single EC2 instance,
  no GPU — Mesa softpipe under Xvfb + snd-dummy ALSA device for OpenAL.
  SSH-only inbound; the RPC bridge stays on 127.0.0.1 and is reached
  from the operator's laptop via `ssh -L 25591:127.0.0.1:25591`.

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for SSH access (default user `ubuntu`).

  InstanceType:
    Type: String
    Default: g4dn.xlarge
    AllowedValues:
      - g4dn.xlarge     # T4 GPU, 4 vCPU, 16 GB — recommended
      - g4dn.2xlarge    # T4 GPU, 8 vCPU, 32 GB
      - g6.xlarge       # L4 GPU, 4 vCPU, 16 GB — newer, more expensive
      - c7i.xlarge      # CPU only — software rendering is too slow for MC's title screen
      - c7i.2xlarge
    Description: >
      MC's renderer needs real GL acceleration. Software paths render
      MC's title screen at <1 fps so the game never advances to the
      multiplayer connect. g4dn.xlarge with the Nvidia driver is the
      cheapest GPU option (~$0.526/hr in us-west-2).

  AllowedSshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH; set to your /32.
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$

  UbuntuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
    Description: >
      Latest Ubuntu 24.04 LTS x86_64 AMI ID via Canonical's public SSM
      parameter. No AMI lookup required — AWS resolves this on stack
      deploy.

  RootVolumeSizeGB:
    Type: Number
    Default: 30
    MinValue: 16

Resources:
  BtoneSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: btone-mod-c - SSH only, bridge stays on localhost
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSshCidr
          Description: SSH (operator laptop)
      Tags:
        - Key: Name
          Value: btone-ec2

  BtoneEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: btone-ec2

  BtoneInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref BtoneSg
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref RootVolumeSizeGB
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: btone-ec2

  BtoneEipAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref BtoneInstance
      AllocationId: !GetAtt BtoneEip.AllocationId

Outputs:
  PublicIp:
    Value: !Ref BtoneEip
    Description: Elastic IP attached to the bot instance

  InstanceId:
    Value: !Ref BtoneInstance

  SshCommand:
    Description: One-liner to SSH in (Ubuntu default user is `ubuntu`)
    Value: !Sub "ssh -i ~/.ssh/${KeyName}.pem ubuntu@${BtoneEip}"
